repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: branch-name-check
        name: Validate branch name (GitHub Flow)
        entry: uv run python scripts/check_branch_name.py
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
