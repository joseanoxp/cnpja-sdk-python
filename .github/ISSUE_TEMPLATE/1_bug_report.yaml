name: Bug report
description: Report an error or unexpected behavior in the SDK
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Summary
      description: |
        A clear and concise description of the bug.
        Include the minimal code snippet and the full traceback if applicable.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    attributes:
      label: SDK version
      description: Output of `uv pip show cnpja | grep Version`
      placeholder: e.g., 1.2.0
    validations:
      required: true

  - type: input
    attributes:
      label: Environment
      description: Python version and OS
      placeholder: e.g., Python 3.12.8 on Ubuntu 24.04
    validations:
      required: true

  - type: input
    attributes:
      label: API endpoint (if applicable)
      description: Which API endpoint was involved
      placeholder: e.g., office.read, list.create_export
    validations:
      required: false
